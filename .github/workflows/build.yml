name: Build Kino APK
on:
  push:
    branches: [ master, main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
        
      - name: Verify APK was created
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "BUILD FAILED: No APK was generated"
            cat build.log | grep -E "error:|FAILED|Exception" | head -20
            exit 1
          else
            echo "SUCCESS: APK found at $APK_PATH"
            ls -la "$APK_PATH"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kino-APK
          path: |
            **/build/outputs/apk/**/*.apk

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
